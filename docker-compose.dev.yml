version: '3.8'

services:
  fitnab:
    image: rust:alpine
    container_name: fitnab_dev
    # Mount the local project directory so changes reflect immediately
    volumes:
      - .:/app
      - cargo_registry:/usr/local/cargo/registry
      - target_cache:/app/target
      - ./data:/app/data
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info,fitnab=debug
      - RUSTFLAGS=-C target-feature=-crt-static
    # Install dependencies and run natively for fast development iteration
    command: >
      sh -c "apk add --no-cache musl-dev sqlite-dev openssl-dev pkgconfig g++ gcc make cmake go perl clang clang-dev linux-headers git &&
             cargo run"

volumes:
  cargo_registry:
  target_cache:
